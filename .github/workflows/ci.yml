name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFALCON_MARCH_NATIVE=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Install (staging)
        run: cmake --install build --prefix staging

      - name: Verify package
        run: |
          echo "=== Headers ===" && find staging/include -name '*.h' && echo
          echo "=== Libraries ===" && find staging/lib -type f && echo
          echo "=== Config template ===" && ls staging/share/falcon/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: falcon-gateway-linux-x64
          path: staging/
          retention-days: 7
