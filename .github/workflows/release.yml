name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFALCON_MARCH_NATIVE=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Install (staging)
        run: cmake --install build --prefix staging

      - name: Create package archive
        run: |
          cd staging
          tar czf ../falcon-gateway-linux-x64.tar.gz .

      - name: Write release notes
        run: |
          cat > /tmp/release_notes.md << 'NOTES_EOF'
          CTP 期货交易网关静态库，支持 4 交易所（SHFE/CZCE/DCE/GFEX）。

          ### 使用
          ```bash
          tar xzf falcon-gateway-linux-x64.tar.gz
          # 在 CMakeLists.txt 中:
          #   find_library(FALCON falcon_gateway PATHS <path>/lib)
          #   target_link_libraries(your_app falcon_gateway)
          ```

          ### Docker
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          ```
          NOTES_EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            falcon-gateway-linux-x64.tar.gz \
            --title "FalconGateway ${{ github.ref_name }}" \
            --generate-notes \
            --notes-file /tmp/release_notes.md

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
