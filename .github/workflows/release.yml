name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04

    permissions:
      contents: write    # GitHub Release
      packages: write    # GHCR + attestation
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFALCON_MARCH_NATIVE=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Install (staging)
        run: cmake --install build --prefix staging

      # ============================================================
      # GitHub Release (tarball artifact)
      # ============================================================
      - name: Create package archive
        run: |
          cd staging
          tar czf ../falcon-gateway-linux-x64.tar.gz .

      - name: Generate checksum
        run: sha256sum falcon-gateway-linux-x64.tar.gz > falcon-gateway-linux-x64.tar.gz.sha256

      - name: Build attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: falcon-gateway-linux-x64.tar.gz

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FalconGateway ${{ github.ref_name }}"
          body: |
            ## FalconGateway ${{ github.ref_name }}

            CTP 期货交易网关静态库，支持 4 交易所（SHFE/CZCE/DCE/GFEX）。

            ### 包含内容
            - **libfalcon_gateway.a** — 网关静态库
            - **liblogger.so** — 异步日志库
            - **CTP SE SDK** — 上期技术交易/行情 API
            - **头文件** — 完整 C++ API 头文件
            - **config.json.example** — 配置模板

            ### 使用方式
            ```bash
            # 方式一：下载 tarball
            tar xzf falcon-gateway-linux-x64.tar.gz
            # 在 CMakeLists.txt 中:
            #   find_library(FALCON falcon_gateway PATHS <path>/lib)
            #   target_link_libraries(your_app falcon_gateway)

            # 方式二：Docker 镜像
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          files: |
            falcon-gateway-linux-x64.tar.gz
            falcon-gateway-linux-x64.tar.gz.sha256
          generate_release_notes: true

      # ============================================================
      # GitHub Packages — GHCR (Docker image)
      # ============================================================
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
